name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_DISABLE_DEBUG: 'true'
        with:
          tauriScript: pnpm tauri
          tagName: v__VERSION__
          releaseName: Maida v__VERSION__
          releaseBody: |
            ## Download / ダウンロード / 下載 / 下载

            | Your system | Which file |
            |---|---|
            | Windows | the `.exe` file |
            | Steam Deck or other Linux | the `.AppImage` file |
            | Ubuntu / Mint / Debian | the `.deb` file (installs into your system menu) |

            ### First-time setup on Linux

            **AppImage** needs executable permission on first run:
            - **GUI**: right-click the file → Properties → Permissions → allow executing as a program
            - **Terminal**: `chmod +x Maida_*.AppImage` then run the file

            **.deb** users don't need this — the installer handles it automatically.

            <details>
            <summary>日本語 / 繁體中文 / 简体中文</summary>

            **日本語** — **AppImage** は初回実行時に実行権限が必要です:
            - GUI:ファイルを右クリック → プロパティ → 権限 → 「プログラムとして実行可能」にチェック
            - ターミナル:`chmod +x Maida_*.AppImage` の後、ファイルを実行

            **.deb** ユーザーは不要 — インストーラーが自動で処理します。

            **繁體中文** — **AppImage** 首次執行需要執行權限:
            - GUI:右鍵檔案 → 內容 → 權限 → 允許以程式執行
            - 終端機:`chmod +x Maida_*.AppImage` 然後執行檔案

            **.deb** 使用者不用 — 安裝程式會自動處理。

            **简体中文** — **AppImage** 首次运行需要可执行权限:
            - GUI:右键文件 → 属性 → 权限 → 允许作为程序执行
            - 终端:`chmod +x Maida_*.AppImage` 然后运行文件

            **.deb** 用户不需要 — 安装程序会自动处理。
            </details>

            Files ending in `.sig` and `latest.json` are for the auto-updater and do not need to be downloaded.
            `.sig` で終わるファイルと `latest.json` は自動更新用で、個別のダウンロードは不要です。
            `.sig` 結尾的檔案跟 `latest.json` 是自動更新用,不需要手動下載。
            `.sig` 结尾的文件跟 `latest.json` 是自动更新用,不需要手动下载。

            ---

            ## What's new / 更新内容 / 更新內容 / 更新内容

            _TODO: replace with release-specific changes before publishing. Provide English in the main body; wrap 日本語 / 繁體中文 / 简体中文 sections in <details><summary>…</summary></details>._

            ---

            Contact: [contact me](mailto:bertram@brightraven.world) (bertram@brightraven.world)
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
