name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_DISABLE_DEBUG: 'true'
        with:
          tauriScript: pnpm tauri
          tagName: v__VERSION__
          releaseName: Maida v__VERSION__
          releaseBody: |
            ## Download / гГАгВ¶гГ≥гГ≠гГЉгГЙ / дЄЛиЉЙ

            | Your system | Which file |
            |---|---|
            | Windows | the `.exe` file |
            | Steam Deck or other Linux | the `.AppImage` file |
            | Ubuntu / Mint / Debian | the `.deb` file (installs into your system menu) |

            ### First-time setup on Linux

            **AppImage** needs executable permission on first run:
            - **GUI**: right-click the file вЖТ Properties вЖТ Permissions вЖТ allow executing as a program
            - **Terminal**: `chmod +x Maida_*.AppImage` then run the file

            **.deb** users don't need this вАФ the installer handles it automatically.

            Files ending in `.sig` and `latest.json` are for the auto-updater and do not need to be downloaded.
            `.sig` гБІзµВгВПгВЛгГХгВ°гВ§гГЂгБ® `latest.json` гБѓиЗ™еЛХжЫіжЦ∞зФ®гБІгАБеАЛеИ•гБЃгГАгВ¶гГ≥гГ≠гГЉгГЙгБѓдЄНи¶БгБІгБЩгАВ
            `.sig` зµРе∞ЊзЪДж™Фж°ИиЈЯ `latest.json` жШѓиЗ™еЛХжЫіжЦ∞зФ®,дЄНйЬАи¶БжЙЛеЛХдЄЛиЉЙгАВ
            `.sig` зїУе∞ЊзЪДжЦЗдїґиЈЯ `latest.json` жШѓиЗ™еК®жЫіжЦ∞зФ®,дЄНйЬАи¶БжЙЛеК®дЄЛиљљгАВ

            ---

            ## What's new / жЫіжЦ∞еЕІеЃє

            _TODO: replace with release-specific changes before publishing._
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
