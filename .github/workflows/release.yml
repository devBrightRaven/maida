name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_DISABLE_DEBUG: 'true'
        with:
          tauriScript: pnpm tauri
          tagName: v__VERSION__
          releaseName: Maida v__VERSION__
          releaseBody: |
            ## Download / ダウンロード / 下載

            | Your system | Which file |
            |---|---|
            | Windows | the `.exe` file |
            | Steam Deck or other Linux | the `.AppImage` file (single file, just run it) |
            | Ubuntu / Mint / Debian | the `.deb` file (installs into your system menu) |

            Files ending in `.sig` and `latest.json` are for the auto-updater and do not need to be downloaded.
            `.sig` で終わるファイルと `latest.json` は自動更新用で、個別のダウンロードは不要です。
            `.sig` 結尾的檔案跟 `latest.json` 是自動更新用,不需要手動下載。
            `.sig` 结尾的文件跟 `latest.json` 是自动更新用,不需要手动下载。

            ---

            ## What's new / 更新內容

            _TODO: replace with release-specific changes before publishing._
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
