appId: com.raven.maida
productName: Maida

directories:
  output: release
  buildResources: build

# Windows configuration
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.ico

# NSIS installer configuration
nsis:
  artifactName: Maida-${version}-win-setup.exe
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Maida
  uninstallDisplayName: Maida

# Portable configuration
portable:
  artifactName: Maida-${version}-win-portable.exe

# Linux configuration
linux:
  target:
    - target: AppImage
      arch: [x64]
  artifactName: Maida-${version}-linux.AppImage
  category: Game

# macOS configuration
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  artifactName: Maida-${version}-mac.dmg
  category: public.app-category.games

# Files to include in the build (inside asar)
files:
  - dist/**/*
  - electron/**/*
  - package.json

# Extra resources (outside asar, for file system access)
extraResources:
  - from: src/data/
    to: data/
    filter:
      - "**/*.json"
  - from: build/icon.ico
    to: icon.ico

# asar packaging
asar: true

# GitHub Releases (可替換的發布來源)
publish:
  provider: github
  owner: bright-raven
  repo: codex
  releaseType: release
