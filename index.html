<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maida</title>
    <script>
      try {
        document.documentElement.setAttribute('data-theme',
          localStorage.getItem('maida-theme') || 'dark'
        );
        // Set lang for screen readers before React loads
        var supported = ['en', 'zh-TW', 'ja'];
        var stored = localStorage.getItem('maida_locale');
        var lang = stored && supported.indexOf(stored) >= 0 ? stored : (navigator.language || 'en');
        var base = lang.split('-')[0];
        var match = supported.find(function(l) { return l === lang; }) ||
                    supported.find(function(l) { return l.split('-')[0] === base; }) || 'en';
        // Keep full locale (zh-TW / zh-CN) so SR distinguishes traditional vs simplified.
        // NVDA with 'zh' alone defaults to Simplified Chinese voice mode.
        document.documentElement.lang = match;
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    </script>
  </head>
  <body>
    <div id="root" aria-label="Maida"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
